version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"                    # setup.py and setup.cfg are in repository root
    schedule:
      interval: "weekly"
      day: "monday"
      # optional: specifying time in UTC (format HH:MM). Uncomment to set a preferred time.
      # time: "04:00"
    open-pull-requests-limit: 5
    # Dependabot will attempt to parse setup.py / setup.cfg; it also supports requirements.txt if added.
    allow:
      - dependency-type: "direct"

  - package-ecosystem: "github-actions"
    directory: "/.github/workflows"   # workflows live under /.github/workflows
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    allow:
      - dependency-type: "direct"
    # put all updates into a single PR (instead of one per dependency)
    # see https://docs.github.com/en/code-security/tutorials/secure-your-dependencies/optimizing-pr-creation-version-updates
    groups:
      all-actions:
        patterns:
          - "*"
